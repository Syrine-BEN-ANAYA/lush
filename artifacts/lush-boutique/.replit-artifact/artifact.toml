kind = "web"
previewPath = "/"
title = "Lush Boutique"
version = "1.0.0"
id = "artifacts/lush-boutique"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24504

[services.development]
run = "pnpm --filter @workspace/lush-boutique run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lush-boutique", "run", "build" ]
publicDir = "artifacts/lush-boutique/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24504"
BASE_PATH = "/"
